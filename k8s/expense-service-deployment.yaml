apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-service
  namespace: finlife
spec:
  replicas: 2
  selector:
    matchLabels:
      app: expense-service
  template:
    metadata:
      labels:
        app: expense-service
    spec:
      containers:
      - name: expense-service
        image: finlife/expense-service:latest
        ports:
        - containerPort: 8082
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres:5432/finlife_expenses
        - name: SPRING_DATASOURCE_PASSWORD
          value: "finlife123"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /api/expenses/health
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: expense-service
  namespace: finlife
spec:
  selector:
    app: expense-service
  ports:
  - port: 8082
    targetPort: 8082