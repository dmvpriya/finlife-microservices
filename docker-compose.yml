version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: finlife123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  user-service:
    build: ./user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finlife_users
      SPRING_DATASOURCE_PASSWORD: finlife123
    depends_on:
      - postgres

  expense-service:
    build: ./expense-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finlife_expenses
      SPRING_DATASOURCE_PASSWORD: finlife123
    depends_on:
      - postgres

  savings-service:
    build: ./savings-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finlife_savings
      SPRING_DATASOURCE_PASSWORD: finlife123
    depends_on:
      - postgres

  budget-service:
    build: ./budget-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finlife_budget
      SPRING_DATASOURCE_PASSWORD: finlife123
    depends_on:
      - postgres

  investment-service:
    build: ./investment-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finlife_investments
      SPRING_DATASOURCE_PASSWORD: finlife123
    depends_on:
      - postgres

  ai-advisor-service:
    build: ./ai-advisor-service
    ports:
      - "8086:8086"
    environment:
      OPENAI_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - postgres

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - expense-service
      - savings-service
      - budget-service
      - investment-service
      - ai-advisor-service

  frontend:
    build: ./finlife-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  postgres_data: